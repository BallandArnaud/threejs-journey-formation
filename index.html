<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Three.js Portfolio</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <h1>My Three.js Projects</h1>
        <div id="portfolio" class="gallery"></div>

        <script>
            async function loadProjects() {
                // Chargement des projets automatiquement
                const response = await fetch("projects.json");
                const projects = await response.json();

                const portfolio = document.getElementById("portfolio");

                projects.forEach((project) => {
                    const projectDiv = document.createElement("div");
                    projectDiv.className = "project";

                    // Image du projet
                    const img = document.createElement("img");
                    img.src = project.image;
                    img.alt = project.name;

                    // Lien vers le projet live
                    const link = document.createElement("a");
                    link.href = `./${project.name}`;
                    link.target = "_blank";
                    link.textContent = "Voir le projet";

                    // Assemblage
                    projectDiv.appendChild(img);
                    projectDiv.appendChild(link);
                    portfolio.appendChild(projectDiv);
                });
            }

            loadProjects();
        </script>
    </body>
</html>
